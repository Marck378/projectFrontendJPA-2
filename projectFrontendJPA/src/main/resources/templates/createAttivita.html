<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	crossorigin="anonymous"></script>
<title>Creazione attivita</title>
</head>
<body>
	<nav
		th:insert="~{fragments/navigation :: block-navigation(${titolo})}"></nav>

	<div class="container mt-3" align="center">
		<form class="form.content" th:action="@{saveAttivita}" th:object="${attivita}" 
				method="post"
				style="width:50%; margin:auto;">
			<div class="mb-3">
				<label for="description" class="form-label">Descrizione</label>
				<input type="text" class="form-control" id="description" th:field="*{description}">
			</div>
			
			<div align="center">
				<button type="submit" class="btn btn-info mt-5">Salva attivita</button>
				<a th:href="@{listAttivita}" class="btn btn-secondary mt-5">Torna alla lista</a>
			</div>
		</form>
		
		<div th:if="${#fields.hasErrors('*')}" class="alert alert-danger mt-3" role="alert">
			<ul>
				<li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
			</ul>
		</div>
	</div>
</body>
</html>
