<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	crossorigin="anonymous"></script>
<title>Elenco attivita</title>
</head>
<body>
	<nav
		th:insert="~{fragments/navigation :: block-navigation('Elenco attivita')}"></nav>

	<div class="conatainer mt-3" align="center">

		<form th:action="@{listAttivita}" th:object="${param}" method="get"
			class="row g-3 align-items-center mb-4"
			style="width: 60%; margin: auto;">

			<div class="col-auto">
				<input type="text" name="description" class="form-control"
					placeholder="descrizione" th:value="${param.description}">
			</div>

			<div class="col-auto ms-auto">
				<button type="submit" class="btn btn-primary">Cerca</button>
				<a th:href="@{createAttivita}" class="btn btn-secondary">Create
					nuova attivita</a>
			</div>

		</form>

		<table class="table table-secondary"
			style="width: 60%; text-align: center">
			<thead>
				<tr>
					<th>ID</th>
					<th>Descrizione</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="attivita : ${listattivita}" th:attr="data-id=${attivita.id}"
					class="clickable-row" style="cursor: pointer">
					<td align="center">[[${attivita.id}]]</td>
					<td align="center">[[${attivita.description}]]</td>
				</tr>
			</tbody>
		</table>
	</div>

	<script>
	  document.addEventListener("DOMContentLoaded", function () {
	        const rows = document.querySelectorAll(".clickable-row");
	        rows.forEach(row => {
	            row.addEventListener("click", () => {
	                const attivitaId = row.getAttribute("data-id");
	                if (attivitaId) {
	                    window.location.href = `/updateAttivita?id=${attivitaId}`;
	                }
	            });
	        });
	    });
	</script>
</body>
</html>
