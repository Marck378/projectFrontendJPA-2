<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Registrazione</title>
</head>
<body>
    <nav th:insert="~{fragments/navigation :: block-navigation('Registrazione')}"></nav>
    
    <form th:action="@{/saveRegistrazione}" th:object="${req}" method="post">
        <div align="center" class="row mb-4">
            <h1>Registrazione</h1>

            <div class="mb-3">
                <input type="text" name="userName" th:field="*{userName}" class="form-control" placeholder="user name" required/>
            </div>
            <div class="mb-3">
                <input type="password" name="pwd" th:field="*{pwd}" class="form-control" placeholder="Password" required/>
            </div>
            <div class="mb-3">
                <input type="email" name="email" th:field="*{email}" class="form-control" placeholder="indirizzo email"/>
            </div>
            <div>
                <button type="submit" class="btn btn-primary">Registra</button>
            </div>
        </div>
    </form>
</body>
</html>
