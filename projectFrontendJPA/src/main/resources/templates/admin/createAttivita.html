<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<title>Gestione Attività</title>
</head>
<body>
	<nav th:insert="~{fragments/navigation :: block-navigation(${titolo})}"></nav>

	<div class="container mt-3" align="center">
		<div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}" style="width:50%;"></div>
		
		<form class="form.content" th:action="@{/admin/saveAttivita}" th:object="${attivita}" method="post" style="width:50%; margin:auto;">
			
			<input type="hidden" th:field="*{id}">
		
			<table class="table table-secondary m-25">
				<tr>
					<td><label class="form-label">Descrizione Attività</label></td>
					<td>
						<input type="text" th:field="*{description}" class="form-control" placeholder="es. Yoga, Nuoto..." required>
					</td>
				</tr>
			</table>
			
			<div class="mt-4" align="center">
				<button type="submit" class="btn btn-success">Salva Attività</button>
				
				<a th:if="*{id} != null" class="btn btn-danger ms-2" th:href="@{/admin/removeAttivita(id=*{id})}"
				   onclick="return confirm('Sei sicuro di voler rimuovere questa attività?')">
					Rimuovi
				</a>
				
				<a th:href="@{/admin/listAttivita}" class="btn btn-secondary ms-2">Annulla</a>
			</div>		
		</form>	
	</div>
</body>
</html>
